services:
  backend:
    build: ./server
    restart: unless-stopped
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_MODE: ${EMAIL_MODE:-stub}
    volumes:
      # Persist the SQLite database outside the container
      - ./server/app.db:/app/app.db
    expose:
      - "8009"

  frontend:
    build: ./client
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
